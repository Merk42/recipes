<h2>Ingredients</h2>
<div id="ing">
@for (I of ingredients(); track I.name) {
  <span class="ingredient_quantity">{{quantityDisplay(I.quantity)}}</span>
  <span class="ingredient_unit">{{I.unit}}</span>
  <span class="ingredient_name">{{I.name}}
    @if (I.notes) {
      <i class="ingredient_notes">({{I.notes}})</i>
    }
  </span>
}
</div>
