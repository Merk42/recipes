<form novalidate (submit)="onSubmit()">
    <p>fields marked with * are required</p>
    <section>
      <h2>Summary</h2>
      <app-input id="title" [formField]="newRecipeForm.title">title</app-input>
      <app-input id="description" [formField]="newRecipeForm.description">description</app-input>
      <div class="numgroup">
        <app-input id="prep_time_mins" type="number" [formField]="newRecipeForm.prep_time_mins">prep_time_mins</app-input>
        <app-input id="cook_time_mins" type="number" [formField]="newRecipeForm.cook_time_mins">cook_time_mins</app-input>
        <app-input id="servings" type="number" [formField]="newRecipeForm.servings">servings</app-input>
      </div>
    </section>
    <section>
      <h2>Ingredients</h2>
      @for (item of newRecipeModel().ingredients; track $index) {
      <div class="add-ingredient">
        <app-input class="add-quantity" [id]="'quantity-' + $index" type="number" [formField]="newRecipeForm.ingredients[$index].quantity">quantity</app-input>
        <app-select class="add-unit" [id]="'unit-' + $index" [formField]="newRecipeForm.ingredients[$index].unit">unit
          <option value=""></option>
          <option value="tsp">tsp</option>
          <option value="tbsp">tbsp</option>
          <option value="cup">cup</option>
          <option value="oz">oz</option>
        </app-select>
        <app-input class="add-item" [id]="'item-' + $index" [formField]="newRecipeForm.ingredients[$index].item">item</app-input>
        <app-input class="add-notes" [id]="'notes-' + $index" [formField]="newRecipeForm.ingredients[$index].notes">notes</app-input>
        <button style="align-self: self-end;" type="button" (click)="removeIngredient($index)">Remove</button>
      </div>
      }
      <button type="button" (click)="addIngredient()">Add Ingredient</button>
    </section>
    <section>
      <h2>Steps</h2>
      @for (item of newRecipeModel().steps; track $index) {
      <div class="add-step">
        <app-input [id]="'step-' + $index" [formField]="newRecipeForm.steps[$index]">step {{$index+1}}</app-input>
        <button style="align-self: self-end;" type="button" (click)="removeStep($index)">Remove</button>
      </div>
      }
      <button type="button" (click)="addStep()">Add Step</button>
    </section>
    <section>
            <div class="row">
        <div class="row-value">
          <button type="button"
                  title="Ensure the form is valid and required fields are entered before saving"
                  class="btn btn-primary"
                  [disabled]="this.newRecipeForm().invalid()"
                  (click)="onSubmit()">
            Save Profile
          </button>
          <button type="button"
                  class="btn btn-secondary"
                  (click)="onCancel()">
            Cancel
          </button>
        </div>
      </div>
    </section>
    </form>
