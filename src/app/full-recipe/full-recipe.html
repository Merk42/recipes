<a [routerLink]="'/'">browse</a>
@if (!this.recipe.isLoading()) {
  <h1>{{this.recipe.value()?.recipe?.title}}</h1>
  <span>serves {{this.recipe.value()?.recipe?.servings}}</span>
  <p>{{this.recipe.value()?.recipe?.description}}</p>
  <app-ingredients [ingredients]="recipe_ingredients()"/>
  @if(this.recipe.value()?.steps) {
    <app-steps [steps]="recipe_steps()"/>
  }
}
