    @if (recipe().image_url) {
      <img class="photo" [ngSrc]="recipe().image_url ?? ''" width="230" height="130"/>
    } @else {
      <img class="photo" ngSrc="placeholder.png" width="230" height="130"/>
    }
    <h2 class="name">{{recipe().title}}</h2>
    <span class="description">{{recipe().description}}</span>
    <a class="link" [routerLink]="recipe().id">view recipe</a>
